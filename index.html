<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram UI Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="mockup-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="status-icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <header class="screen-header">
                <div class="username-placeholder"></div>
                <div class="header-right-icons">
                    <div class="notification-dot-wrapper">
                        <i class="fa-regular fa-square-plus"></i>
                    </div>
                    <i class="fas fa-bars"></i>
                </div>
            </header>

            <div class="screen-content">
                <div class="profile-info-section">
                    <div class="profile-avatar-wrapper">
                        <div class="avatar main-avatar pink-gradient"></div>
                        <div class="add-story-btn"><i class="fas fa-plus"></i></div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-block">
                            <span class="bar-placeholder long"></span>
                            <span class="bar-placeholder short"></span>
                        </div>
                        <div class="stat-block">
                            <span class="bar-placeholder long"></span>
                            <span class="bar-placeholder short"></span>
                        </div>
                        <div class="stat-block">
                            <span class="bar-placeholder long"></span>
                            <span class="bar-placeholder short"></span>
                        </div>
                    </div>
                </div>

                <div class="profile-bio">
                    <div class="bar-placeholder med"></div>
                    <div class="bar-placeholder short"></div>
                </div>

                <div class="profile-actions">
                    <div class="action-btn-placeholder"></div>
                    <div class="action-btn-placeholder"></div>
                    <div class="action-btn-placeholder"></div>
                </div>

                <div class="highlights-container">
                    <div class="highlight-item">
                        <div class="highlight-circle empty"><i class="fas fa-plus"></i></div>
                    </div>
                    <div class="highlight-item">
                        <div class="highlight-circle pink-gradient"></div>
                    </div>
                    <div class="highlight-item">
                        <div class="highlight-circle pink-gradient"></div>
                    </div>
                    <div class="highlight-item">
                        <div class="highlight-circle pink-gradient"></div>
                    </div>
                </div>

                <div class="profile-tabs">
                    <div class="tab-item active"><i class="fas fa-table-cells"></i></div>
                    <div class="tab-item"><i class="fa-regular fa-id-badge"></i></div>
                </div>

                <div class="photo-grid">
                    <div class="grid-square pink-gradient"></div>
                    <div class="grid-square pink-gradient"></div>
                    <div class="grid-square pink-gradient"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <i class="fa-solid fa-house"></i>
                <i class="fas fa-magnifying-glass"></i>
                <i class="fa-regular fa-square-plus"></i>
                <i class="fa-regular fa-heart"></i>
                <div class="nav-avatar-thumb active-nav"></div>
            </nav>
        </div>


        <div class="phone-screen">
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="status-icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <header class="screen-header">
                <div class="camera-icon"><i class="fa-regular fa-square-caret-right"></i></div>
                <div class="logo-placeholder"></div>
                <div class="header-right-icons">
                    <i class="fa-regular fa-square-plus"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>
            </header>

            <div class="screen-content">
                <div class="stories-tray">
                    <div class="story-wrapper"><div class="story-ring"><div class="story-avatar"></div></div></div>
                    <div class="story-wrapper"><div class="story-ring active"><div class="story-avatar pink-gradient"></div></div></div>
                    <div class="story-wrapper"><div class="story-ring active"><div class="story-avatar pink-gradient"></div></div></div>
                    <div class="story-wrapper"><div class="story-ring active"><div class="story-avatar pink-gradient"></div></div></div>
                    <div class="story-wrapper"><div class="story-ring active"><div class="story-avatar pink-gradient"></div></div></div>
                </div>

                <div class="feed-post">
                    <div class="post-header">
                        <div class="post-user-avatar"></div>
                        <div class="post-user-meta">
                            <div class="bar-placeholder short"></div>
                        </div>
                        <i class="fas fa-ellipsis-vertical post-more-btn"></i>
                    </div>

                    <div class="post-media pink-gradient"></div>

                    <div class="post-actions-bar">
                        <div class="left-actions">
                            <i class="fa-regular fa-heart"></i>
                            <i class="fa-regular fa-comment"></i>
                            <i class="fa-regular fa-paper-plane"></i>
                        </div>
                        <i class="fa-regular fa-bookmark"></i>
                    </div>

                    <div class="post-details-content">
                        <div class="bar-placeholder long"></div>
                        <div class="bar-placeholder med"></div>
                    </div>
                </div>
            </div>

            <nav class="bottom-nav">
                <i class="fas fa-house active-nav"></i>
                <i class="fas fa-magnifying-glass"></i>
                <i class="fa-regular fa-square-plus"></i>
                <div class="notification-indicator">
                    <i class="fa-regular fa-heart"></i>
                    <div class="notification-popup">
                        <i class="fas fa-heart"></i> <i class="fas fa-comment"></i>
                    </div>
                </div>
                <div class="nav-avatar-thumb"></div>
            </nav>
        </div>


        <div class="phone-screen">
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="status-icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <header class="screen-header search-header-layout">
                <div class="search-bar-input">
                    <i class="fas fa-magnifying-glass"></i>
                    <div class="bar-placeholder short"></div>
                </div>
                <i class="fas fa-expand qr-icon"></i>
            </header>

            <div class="screen-content">
                <div class="explore-tags-container">
                    <div class="tag-pill-mock"><i class="fas fa-shop"></i></div>
                    <div class="tag-pill-mock"></div>
                    <div class="tag-pill-mock"></div>
                    <div class="tag-pill-mock"></div>
                </div>

                <div class="explore-complex-grid">
                    <div class="explore-item pink-gradient item-1"></div>
                    <div class="explore-item pink-gradient item-2"></div>
                    <div class="explore-item pink-gradient item-3"></div>
                    <div class="explore-item pink-gradient item-4"></div>
                    <div class="explore-item pink-gradient item-5"></div>
                    <div class="explore-item pink-gradient item-6"></div>
                    <div class="explore-item pink-gradient item-7"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <i class="fa-solid fa-house"></i>
                <i class="fas fa-magnifying-glass active-nav"></i>
                <i class="fa-regular fa-square-plus"></i>
                <i class="fa-regular fa-heart"></i>
                <div class="nav-avatar-thumb"></div>
            </nav>
        </div>

    </div>

</body>
</html>
